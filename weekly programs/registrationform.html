<html>
    <head><style>
        *{
            padding:10px;
            
        }
    </style></head>
    <body>
        <h1>Student Registration Form</h1>
        <form >
            <label for="name">Full name</label>
            <input type="text" placeholder="enter your full name"><br>
            <label for="password">Password</label>
            <input type="password" placeholder="enter your password"><br>
             <label for="email">Email</label>
            <input type="email" placeholder="enter your email"><br>
            <label for="dob">Date of birth</label>
            <input type="date" placeholder="enter your Date of birth"><br>
            <label for="gender">Gender</label>
            <input type="radio" >Female
            <input type="radio" >Male<br>
            <label for="course">Course selection</label>
     <select name="course">
        <option value="cse">Cse</option>
         <option value="csit">Csit</option>
          <option value="ai&ds">ai&ds</option>
           <option value="ece">ece</option>
        
     </select><br>
     <label for="skill">Skills</label>
     <input type="checkbox">Coding
     <input type="checkbox"> cloud platforms
     <input type="checkbox">data visualization
     <input type="checkbox">digital marketing tools<br>
     <label for="address">Adress</label>
     <input type="textarea" placeholder="enter your address here"><br>
     <button type="submit">Submit</button>
            
        </form>
    </body>
</html>
